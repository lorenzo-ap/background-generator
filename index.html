<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gradient Background Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-card">
      <p class="eyebrow">Interactive color tool</p>
      <h1>Background Generator</h1>
      <p class="subtitle">Pick any two colors and create a smooth gradient instantly.</p>

      <section class="controls" aria-label="Gradient controls">
        <label>
          <span>First color</span>
          <input class="color1" type="color" name="color1" value="#00ff00" />
        </label>

        <label>
          <span>Second color</span>
          <input class="color2" type="color" name="color2" value="#ff0000" />
        </label>
      </section>

      <button type="button">Randomize</button>

      <h2>Current CSS background</h2>
      <h3></h3>
    </main>

    <script src="script.js"></script>
  </body>
</html>
